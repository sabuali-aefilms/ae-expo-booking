<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Panel — AE Films JU Expo 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #0d0d0d; color: #fff; min-height: 100vh; padding: 2rem 1.25rem; }
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
  .topbar img { height: 36px; }
  .title { font-size: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; }
  .title span { color: #FE4F32; }
  .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .stat-box { background: #111; border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 1rem 1.5rem; min-width: 140px; }
  .stat-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #BFB4AE; margin-bottom: 4px; }
  .stat-value { font-size: 28px; font-weight: 900; color: #FE4F32; }
  .controls { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
  .btn { border: none; border-radius: 8px; padding: 10px 20px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; letter-spacing: 0.5px; text-transform: uppercase; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #FE4F32; color: #fff; }
  .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.15); color: #BFB4AE; }
  .btn-danger { background: rgba(226,75,74,0.15); border: 1px solid rgba(226,75,74,0.3); color: #F09595; }
  .btn-small { padding: 6px 12px; font-size: 11px; }
  .filter-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .filter-pill { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.08); border-radius: 100px; padding: 6px 16px; font-size: 12px; font-weight: 600; color: #BFB4AE; cursor: pointer; transition: all 0.2s; }
  .filter-pill.active { background: #FE4F32; border-color: #FE4F32; color: #fff; }
  .table-wrap { background: #111; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; overflow: hidden; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }
  thead { background: #161616; }
  th { padding: 12px 16px; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #BFB4AE; text-align: left; white-space: nowrap; }
  td { padding: 12px 16px; font-size: 13px; color: #fff; border-top: 1px solid rgba(255,255,255,0.05); vertical-align: middle; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .badge-s1 { background: rgba(254,79,50,0.15); color: #FE4F32; border: 1px solid rgba(254,79,50,0.3); }
  .badge-s2 { background: rgba(131,181,183,0.15); color: #83B5B7; border: 1px solid rgba(131,181,183,0.3); }
  .empty { text-align: center; padding: 3rem; color: #444; font-size: 14px; }
  .loading { text-align: center; padding: 3rem; color: #BFB4AE; font-size: 14px; }
  .spinner-inline { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #FE4F32; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #1D9E75; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; display: none; z-index: 999; }
  .toast.error { background: #B93C3A; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
  .modal { background: #111; border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 2rem; max-width: 400px; width: 100%; text-align: center; }
  .modal-title { font-size: 18px; font-weight: 900; margin-bottom: 0.5rem; }
  .modal-sub { font-size: 13px; color: #BFB4AE; margin-bottom: 1.5rem; line-height: 1.5; }
  .modal-btns { display: flex; gap: 10px; justify-content: center; }
  #loginScreen { max-width: 360px; margin: 6rem auto; background: #111; border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 2rem; text-align: center; }
  #loginScreen h2 { font-size: 20px; font-weight: 900; margin-bottom: 0.5rem; }
  #loginScreen p { font-size: 13px; color: #BFB4AE; margin-bottom: 1.5rem; }
  #passInput { width: 100%; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px 14px; font-size: 15px; color: #fff; font-family: inherit; outline: none; margin-bottom: 1rem; }
  #passInput:focus { border-color: rgba(254,79,50,0.5); }
  #passErr { font-size: 11px; color: #F09595; margin-bottom: 1rem; display: none; }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen">
  <img src="AE_Films_P_Logo_White.png" alt="AE" style="height:36px;margin-bottom:1.5rem;" onerror="this.style.display='none'" />
  <h2>Admin Panel</h2>
  <p>Enter the admin password to continue</p>
  <input type="password" id="passInput" placeholder="Password" onkeydown="if(event.key==='Enter')login()" />
  <div id="passErr">Incorrect password. Try again.</div>
  <button class="btn btn-primary" style="width:100%;" onclick="login()">Login</button>
</div>

<!-- Admin Panel (hidden until login) -->
<div id="adminPanel" style="display:none; max-width:1100px; margin:0 auto;">

  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <img src="AE_Films_P_Logo_White.png" alt="AE" onerror="this.style.display='none'" />
      <div class="title">Admin <span>Panel</span></div>
    </div>
    <button class="btn btn-outline" onclick="logout()">Logout</button>
  </div>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-label">Total Bookings</div>
      <div class="stat-value" id="statTotal">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">May 10</div>
      <div class="stat-value" id="statDay1">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">May 11</div>
      <div class="stat-value" id="statDay2">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Session 1</div>
      <div class="stat-value" id="statS1">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Session 2</div>
      <div class="stat-value" id="statS2">—</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" onclick="loadBookings()">
      <span class="spinner-inline" id="refreshSpinner" style="display:none;"></span>Refresh
    </button>
    <button class="btn btn-outline" onclick="exportCSV()">Export CSV</button>
    <button class="btn btn-danger" onclick="showResetModal()">Reset All Bookings</button>
  </div>

  <div class="filter-row">
    <div class="filter-pill active" onclick="setFilter('all', this)">All</div>
    <div class="filter-pill" onclick="setFilter('May 10, 2026 (Sunday)', this)">May 10</div>
    <div class="filter-pill" onclick="setFilter('May 11, 2026 (Monday)', this)">May 11</div>
    <div class="filter-pill" onclick="setFilter('Session 1', this)">Session 1</div>
    <div class="filter-pill" onclick="setFilter('Session 2', this)">Session 2</div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Email</th>
          <th>Date</th>
          <th>Session</th>
          <th>Time Slot</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="bookingsTable">
        <tr><td colspan="7" class="loading"><span class="spinner-inline"></span>Loading bookings...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Are you sure?</div>
    <div class="modal-sub" id="modalSub"></div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="modalConfirmBtn">Confirm</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx9HRZlpo-VeDDEnCNFQuPUDLr59hQNZVPv95hfnGzxvDW5LrcSJRH7Ajao3Ncu8cE/exec';
  const PROXY      = 'https://corsproxy.io/?';
  const ADMIN_PASS = 'AEFilms2026';

  let allBookings  = [];
  let activeFilter = 'all';

  // ── Auth ──
  function login() {
    const val = document.getElementById('passInput').value;
    if (val === ADMIN_PASS) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display  = 'block';
      loadBookings();
    } else {
      document.getElementById('passErr').style.display = 'block';
    }
  }
  function logout() {
    document.getElementById('loginScreen').style.display = 'block';
    document.getElementById('adminPanel').style.display  = 'none';
    document.getElementById('passInput').value = '';
  }

  // ── Load bookings ──
  async function loadBookings() {
    document.getElementById('refreshSpinner').style.display = 'inline-block';
    try {
      const url  = PROXY + encodeURIComponent(SCRIPT_URL);
      const res  = await fetch(url);
      const data = await res.json();
      if (data.status === 'success') {
        allBookings = data.booked || [];
        updateStats();
        renderTable();
      }
    } catch(e) {
      showToast('Failed to load bookings', true);
    }
    document.getElementById('refreshSpinner').style.display = 'none';
  }

  // ── Stats ──
  function updateStats() {
    document.getElementById('statTotal').textContent = allBookings.length;
    document.getElementById('statDay1').textContent  = allBookings.filter(b => b.date.includes('May 10')).length;
    document.getElementById('statDay2').textContent  = allBookings.filter(b => b.date.includes('May 11')).length;
    document.getElementById('statS1').textContent    = allBookings.filter(b => b.session.includes('Session 1')).length;
    document.getElementById('statS2').textContent    = allBookings.filter(b => b.session.includes('Session 2')).length;
  }

  // ── Filter ──
  function setFilter(val, el) {
    activeFilter = val;
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    renderTable();
  }

  // ── Render table ──
  function renderTable() {
    const tbody = document.getElementById('bookingsTable');
    let filtered = activeFilter === 'all'
      ? allBookings
      : allBookings.filter(b => b.date.includes(activeFilter) || b.session.includes(activeFilter));

    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty">No bookings found</td></tr>';
      return;
    }

    tbody.innerHTML = filtered.map((b, i) => {
      const isS1    = b.session.includes('Session 1');
      const badge   = isS1
        ? '<span class="badge badge-s1">Session 1</span>'
        : '<span class="badge badge-s2">Session 2</span>';
      const nameVal = b.name  || '—';
      const emailVal= b.email || '—';
      return `<tr>
        <td style="color:#555;">${i + 1}</td>
        <td><strong>${nameVal}</strong></td>
        <td style="color:#BFB4AE;">${emailVal}</td>
        <td>${b.date}</td>
        <td>${badge}</td>
        <td style="color:#FE4F32;font-weight:600;">${b.slot}</td>
        <td><button class="btn btn-danger btn-small" onclick="confirmDelete(${i}, '${nameVal}', '${b.slot}')">Delete</button></td>
      </tr>`;
    }).join('');
  }

  // ── Delete ──
  function confirmDelete(index, name, slot) {
    document.getElementById('modalTitle').textContent = 'Delete Booking';
    document.getElementById('modalSub').textContent   = 'Delete booking for ' + name + ' at ' + slot + '? This cannot be undone.';
    document.getElementById('modalConfirmBtn').onclick = () => deleteBooking(index);
    document.getElementById('modalOverlay').style.display = 'flex';
  }

  async function deleteBooking(index) {
    closeModal();
    let filtered = activeFilter === 'all'
      ? allBookings
      : allBookings.filter(b => b.date.includes(activeFilter) || b.session.includes(activeFilter));
    const booking = filtered[index];
    const realIndex = allBookings.indexOf(booking);

    try {
      const params = new URLSearchParams({
        action:  'delete',
        date:    booking.date,
        session: booking.session,
        slot:    booking.slot
      });
      const url = PROXY + encodeURIComponent(SCRIPT_URL + '?' + params.toString());
      await fetch(url);
      allBookings.splice(realIndex, 1);
      updateStats();
      renderTable();
      showToast('Booking deleted');
    } catch(e) {
      showToast('Failed to delete', true);
    }
  }

  // ── Reset All ──
  function showResetModal() {
    document.getElementById('modalTitle').textContent = 'Reset All Bookings';
    document.getElementById('modalSub').textContent   = 'This will permanently delete ALL ' + allBookings.length + ' bookings. This cannot be undone.';
    document.getElementById('modalConfirmBtn').onclick = resetAll;
    document.getElementById('modalOverlay').style.display = 'flex';
  }

  async function resetAll() {
    closeModal();
    try {
      const params = new URLSearchParams({ action: 'reset' });
      const url = PROXY + encodeURIComponent(SCRIPT_URL + '?' + params.toString());
      await fetch(url);
      allBookings = [];
      updateStats();
      renderTable();
      showToast('All bookings reset');
    } catch(e) {
      showToast('Failed to reset', true);
    }
  }

  // ── Export CSV ──
  function exportCSV() {
    const rows = [['#','Name','Email','Date','Session','Slot']];
    allBookings.forEach((b, i) => rows.push([i+1, b.name||'', b.email||'', b.date, b.session, b.slot]));
    const csv  = rows.map(r => r.map(v => '"' + v + '"').join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = 'JU_Expo_Bookings.csv';
    a.click();
  }

  // ── Modal ──
  function closeModal() {
    document.getElementById('modalOverlay').style.display = 'none';
  }

  // ── Toast ──
  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = 'toast' + (isError ? ' error' : '');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }
</script>
</body>
</html>
